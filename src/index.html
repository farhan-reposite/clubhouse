<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clubhouse</title>
  <link rel="stylesheet" href="./style.css" />
  <!-- Apply theme + sidebar state immediately to avoid flash -->
  <script>
    const saved = localStorage.getItem('theme')
    if (saved !== 'light') {
      document.documentElement.classList.add('dark')
    }
    if (localStorage.getItem('sidebarCollapsed') === '1') {
      document.documentElement.classList.add('sidebar-collapsed')
    }
  </script>
</head>
<body class="flex h-screen overflow-hidden bg-[#f4f4f5] dark:bg-[#24242a]">

  <!-- Login wrapper (full screen, shown when logged out) -->
  <div id="login-wrapper" class="hidden w-full h-full"></div>

  <!-- App shell (shown when logged in) -->
  <div id="app-shell" class="hidden w-full h-full overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="flex flex-col flex-shrink-0 w-60 bg-[#fff] dark:bg-[#24242a] border-r border-gray-200 dark:border-white/10">

      <!-- Logo area -->
      <div class="px-5 py-5 dark:border-white/10">
        <div class="flex items-center justify-between logo-row">
          <div id="logo-full" class="flex items-center min-w-0">
            <img id="logo-for-dark" src="./assets/logo-light.png" alt="Clubhouse Logo" class="hidden object-contain w-auto h-8 dark:block" onerror="this.style.display='none';"/>
            <img id="logo-for-light" src="./assets/logo-dark.PNG" alt="Clubhouse Logo" class="block object-contain w-auto h-8 dark:hidden" onerror="this.style.display='none';"/>
            <div id="logo-fallback" class="items-center hidden gap-3">
              <div class="flex items-center justify-center flex-shrink-0 text-lg font-bold text-white bg-orange-500 rounded-lg shadow-sm w-9 h-9">C</div>
              <div class="sidebar-text">
                <p class="text-sm font-bold leading-tight text-gray-900 dark:text-white">Clubhouse</p>
                <p class="text-xs text-zinc-500">Management System</p>
              </div>
            </div>
          </div>

          <img id="logo-small" src="./assets/small-logo.png" alt="Clubhouse" class="flex-shrink-0 object-contain w-8 h-8" onerror="this.style.display='none';"/>

          <button id="sidebar-toggle-btn" title="Collapse sidebar" class="flex-shrink-0 topbar-icon-btn">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
          </button>
        </div>
      </div>

      <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto">
        <p class="px-3 pb-2 pt-2 text-[10px] font-semibold text-gray-400 dark:text-zinc-600 uppercase tracking-widest sidebar-text">Menu</p>
        <a href="#dashboard" class="nav-link" data-page="dashboard" title="Dashboard">
          <svg class="flex-shrink-0 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#fnb" class="nav-link" data-page="fnb" title="F&amp;B POS">
          <svg class="flex-shrink-0 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          <span class="nav-label">F&amp;B POS</span>
        </a>
        <a href="#racket" class="nav-link" data-page="racket" title="Racket">
          <svg class="flex-shrink-0 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span class="nav-label">Racket</span>
        </a>
        <a href="#stock" class="nav-link" data-page="stock" title="Stock F&amp;B">
          <svg class="flex-shrink-0 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          <span class="nav-label">Stock F&amp;B</span>
        </a>
        <a href="#members" class="nav-link" data-page="members" title="Members">
          <svg class="flex-shrink-0 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span class="nav-label">Members</span>
        </a>
        <a href="#transaction" class="nav-link" data-page="transaction" title="Transactions">
          <svg class="flex-shrink-0 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span class="nav-label">Transactions</span>
        </a>
        <a href="#report" class="nav-link" data-page="report" title="Report">
          <svg class="flex-shrink-0 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span class="nav-label">Report</span>
        </a>
      </nav>

      <!-- User info + logout -->
      <div class="px-4 py-3 border-t border-gray-200 dark:border-white/10">
        <div class="flex items-center gap-3 user-info-row">
          <div class="flex items-center justify-center flex-shrink-0 w-8 h-8 text-sm font-bold text-white bg-orange-500 rounded-full">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <div class="flex-1 min-w-0 sidebar-text">
            <p id="sidebar-user-name" class="text-sm font-semibold text-gray-800 truncate dark:text-white"></p>
            <p id="sidebar-user-role" class="text-xs text-gray-400 dark:text-zinc-500"></p>
          </div>
          <button id="btn-logout" title="Sign out" class="flex-shrink-0 p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>
        <p class="mt-2 text-xs text-gray-400 dark:text-zinc-600 sidebar-text">v1.0.0 &bull; Clubhouse</p>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex flex-col flex-1 overflow-auto">
      <!-- Topbar -->
      <header data-tauri-drag-region class="flex items-center justify-between flex-shrink-0 px-6 py-4 bg-white dark:bg-[#24242a] border-b border-gray-100 dark:border-white/5 topbar-shadow">
        <h2 id="page-title" class="text-xl font-bold tracking-tight text-gray-900 dark:text-white">Dashboard</h2>
        <div class="flex items-center gap-1">
          <!-- Theme toggle -->
          <button id="theme-toggle" title="Toggle light/dark mode" class="topbar-icon-btn">
            <svg class="block w-4 h-4 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            <svg class="hidden w-4 h-4 dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          </button>

          <!-- Date badge -->
          <div class="flex items-center gap-1.5 text-xs font-medium text-gray-500 dark:text-zinc-400 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 px-3 py-1.5 rounded-xl mx-1">
            <svg class="w-3.5 h-3.5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span id="current-date"></span>
          </div>

          <!-- Divider -->
          <div class="w-px h-4 mx-1 bg-gray-200 dark:bg-white/10"></div>

          <!-- Fullscreen toggle -->
          <button id="topbar-fullscreen-btn" title="Toggle Fullscreen" class="topbar-icon-btn">
            <svg id="icon-topbar-expand" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
            <svg id="icon-topbar-compress" class="hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 3v3a2 2 0 01-2 2H3m18 0h-3a2 2 0 01-2-2V3m0 18v-3a2 2 0 012-2h3M3 16h3a2 2 0 012 2v3"/></svg>
          </button>

          <!-- Minimize -->
          <button id="topbar-minimize-btn" title="Minimize" class="topbar-icon-btn">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>
          </button>

          <!-- Close -->
          <button id="topbar-close-btn" title="Close" class="topbar-icon-btn topbar-close">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </header>

      <!-- Page Content -->
      <div id="app-content" class="flex-1 p-6 overflow-auto">
        <div class="flex items-center justify-center h-full">
          <div class="text-center">
            <div class="w-12 h-12 mx-auto mb-4 border-4 border-orange-500 rounded-full border-t-transparent animate-spin"></div>
            <p class="text-gray-500 dark:text-zinc-400">Loading...</p>
          </div>
        </div>
      </div>
    </main>

  </div><!-- /app-shell -->

  <!-- Toast notification -->
  <div id="toast" class="fixed bottom-5 right-5 z-[100] hidden">
    <div class="flex items-center gap-2 px-5 py-3 text-sm text-white bg-gray-900 shadow-lg dark:bg-zinc-800 rounded-xl">
      <span id="toast-msg"></span>
    </div>
  </div>

  <!-- Sidebar collapse toggle -->
  <script>
    (() => {
      const btn = document.getElementById('sidebar-toggle-btn')
      if (!btn) return
      const setTitle = () => {
        const collapsed = document.documentElement.classList.contains('sidebar-collapsed')
        btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar'
      }
      setTitle()
      btn.addEventListener('click', () => {
        document.documentElement.classList.toggle('sidebar-collapsed')
        localStorage.setItem(
          'sidebarCollapsed',
          document.documentElement.classList.contains('sidebar-collapsed') ? '1' : '0'
        )
        setTitle()
      })
    })()
  </script>

  <script type="module" src="./main.js"></script>
</body>
</html>
